<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   	<meta name="description" content="Hey TANKERS! This is the ULTIMATE BPR dashboard for The Conos League 🏒 ">

    <meta property="og:title" content="The Conos League BPR Calculator">
    <meta property="og:description" content="Hey TANKERS! This is the ULTIMATE BPR dashboard for The Conos League 🏒 ">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="The Conos League BPR Calculator">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Merriweather:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="favicon.ico">

	<link rel="apple-touch-icon" href="/icon-iphone.png">

	<link rel="manifest" href="/manifest.json">

    <style>
        :root {
            --bg-base: #EFF0EE; 
            --bg-surface: #111111; 
            --border-color: #222222;
            --text-main: #000000; 
            --text-muted: #888888;
            --text-subtle: #555555;
            --accent-gold: #019ABD; 
            --row-hover: #FE8A65;
        }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--bg-base); 
            margin: 0; 
            padding: 0; 
            color: var(--text-main); 
            -webkit-font-smoothing: antialiased;
        }

        .container { 
            max-width: 700px; 
            margin: 0 auto; 
            background-color: var(--bg-base); 
            min-height: 100vh;
        }

        .header { 
            padding: 40px 20px 20px; 
            border-bottom: 1px solid var(--border-color); 
        }

        .header h1 { 
            margin: 0; 
            font-family: 'Merriweather', serif; 
            font-size: 28px; 
            font-weight: 700; 
            color: var(--text-main); 
        }

        .header p.subtitle { 
            margin: 8px 0 0; 
            font-size: 13px; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            font-weight: 600;
        }
        
        table { width: 100%; border-collapse: collapse; }
        
        th { 
            color: var(--text-subtle); 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            text-align: left; 
            padding: 12px 20px; 
            border-bottom: 1px solid var(--border-color); 
            font-weight: 600;
        }
        
        td { 
            padding: 16px 20px; 
            border-bottom: 1px solid var(--border-color); 
            vertical-align: middle;
        }
        
        .clickable-row { cursor: pointer; transition: background-color 0.15s ease; }
        .clickable-row:hover { background-color: var(--row-hover); }
        
        .rank-col { font-weight: 700; color: var(--text-muted); width: 40px; font-size: 14px;}
        .team-name { font-weight: 700; font-size: 16px; color: var(--text-main); }
        
        .score-col { 
            font-weight: 700; 
            font-size: 16px; 
            text-align: right; 
            color: var(--text-main); 
            font-variant-numeric: tabular-nums; 
        }
        
        .pos-badge { 
            display: inline-block; 
            color: var(--text-muted); 
            font-size: 12px; 
            font-weight: 700; 
            text-align: left; 
            width: 35px; 
        }
        
        .player-name {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-main);
        }

        .btn-back { 
            display: inline-flex; 
            align-items: center; 
            color: var(--text-muted); 
            font-size: 13px; 
            font-weight: 600; 
            cursor: pointer; 
            margin: 20px; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-back:hover { color: var(--text-main); }
        
        .hidden { display: none; }
        
        .section-title { 
            font-family: 'Merriweather', serif;
            color: var(--text-main); 
            font-size: 24px; 
            font-weight: 700; 
            margin: 0 20px 20px; 
        }
        
        .total-row td { 
            background-color: var(--bg-surface); 
            border-top: 1px solid var(--border-color); 
            border-bottom: none; 
            padding: 20px;
        }
        .total-row .score-col { 
            color: var(--accent-gold); 
            font-size: 22px; 
        }
        
        #loading-state { 
            padding: 60px 20px; 
            text-align: center; 
            color: var(--text-muted); 
            font-weight: 500; 
            font-size: 14px;
        }

        .update-footer {
            text-align: center;
            padding: 30px 20px 50px;
            color: var(--text-subtle);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
            border-top: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>The 2025-26 Conos BPR Calculator</h1>
        <p class="subtitle" style="color: #000000;">🎉 Congratulations to our winner: Les Habitants 🎉</p>
        <p class="subtitle">The Conos League • End of Season Best Possible Roster</p>
    </div>

    <div>
        <div id="loading-state">
            Analyzing roster combinations...
        </div>

        <div id="view-standings" class="hidden">
            <table>
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Franchise</th>
                        <th style="text-align: right;">Total Points</th>
                    </tr>
                </thead>
                <tbody id="standings-body"></tbody>
            </table>
        </div>

        <div id="view-team" class="hidden">
            <div class="btn-back" onclick="navigateHome()">← Standings</div>
            <h2 class="section-title" id="detail-team-name">Team Name</h2>
            <table>
                <thead>
                    <tr>
                        <th style="width: 40px;">Pos</th>
                        <th>Player</th>
                        <th style="text-align: right;">Points</th>
                    </tr>
                </thead>
                <tbody id="team-body"></tbody>
                <tfoot>
                    <tr class="total-row">
                        <td colspan="2" style="text-align: right; font-weight: 700; color: var(--text-muted); text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px;">Maximum Points:</td>
                        <td id="detail-total-score" class="score-col">0</td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <div class="update-footer" id="calc-date-footer">
            Checking data sync...
        </div>

    </div>
</div>

<script>
    // 1. CONFIGURATION
    const CSV_URL = "https://raw.githubusercontent.com/stephansma/The-Conos-BPR-Calculator/refs/heads/main/Fantrax-Players-The%20Conos%20League.csv"; // PASTE YOUR RAW GITHUB CSV URL HERE
    const DATE_URL = "https://raw.githubusercontent.com/stephansma/The-Conos-BPR-Calculator/refs/heads/main/update.txt"; // PASTE YOUR RAW GITHUB URL FOR update.txt HERE

    const teamMap = {
        "ADB": "Armand's Dirty Birdz", "FZ": "Failowitz", "GG": "Ghol Gholab",
        "GRN": "Greenalls 🥈", "JS": "Jokerin Salama 🥉", "KR": "Kitimat Rebels",
        "LHB": "Les Habitants 🥇", "MC": "Massilia Conos", "PA": "Project Apollo",
        "PSK": "Persisk HC", "TPA": "Twin Powers Activate", "TT": "Toronto Traders",
        "UPI": "Upendi"
    };

    let finalStandings = [];

    // Fetches the text from your update.txt file
    async function fetchFileDate() {
        const dateElement = document.getElementById('calc-date-footer');
        try {
            const response = await fetch(DATE_URL);
            if (response.ok) {
                const dateText = await response.text();
                dateElement.innerText = "Data Last Updated: " + dateText.trim();
            } else {
                dateElement.innerText = "Data Last Updated: Check GitHub Repo"; 
            }
        } catch (e) {
            dateElement.innerText = "Data Last Updated: Unknown"; 
        }
    }

    // 2. Math Engine
    function optimizeRoster(teamCode, teamName, players) {
        let model = {
            "optimize": "points",
            "opType": "max",
            "constraints": {
                "C": {"equal": 3}, "LW": {"equal": 3}, "RW": {"equal": 3},
                "D": {"equal": 4}, "G": {"equal": 3}
            },
            "variables": {} 
        };

        players.forEach((p, idx) => {
            model.constraints[`player_${idx}`] = {"max": 1}; 
            p.positions.forEach(pos => {
                if(["C", "LW", "RW", "D", "G"].includes(pos)) {
                    let varName = `${idx}_${pos}`; 
                    model.variables[varName] = { "points": p.points, [pos]: 1, [`player_${idx}`]: 1 };
                }
            });
        });

        let results = solver.Solve(model);
        let optimalRoster = [];
        let totalScore = 0;

        for (const [key, value] of Object.entries(results)) {
            if (value > 0.5 && key !== "feasible" && key !== "result" && key !== "bounded") {
                let parts = key.split("_");
                let playerIndex = parseInt(parts[0]);
                let player = players[playerIndex];
                optimalRoster.push({ name: player.name, locked_position: parts[1], points: player.points });
                totalScore += player.points;
            }
        }

        const posOrder = {"C":1, "LW":2, "RW":3, "D":4, "G":5};
        optimalRoster.sort((a, b) => posOrder[a.locked_position] - posOrder[b.locked_position] || b.points - a.points);
        return { team_code: teamCode, team_name: teamName, bpr_score: Math.round(totalScore), roster: optimalRoster };
    }

    // 3. Load Data
    function loadLeagueData() {
        Papa.parse(CSV_URL, {
            download: true, 
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                let teamsData = {};

                results.data.forEach(row => {
                    let fantasyTeamCode = row["Status"] ? row["Status"].trim().toUpperCase() : "";
                    if (!fantasyTeamCode || fantasyTeamCode === "FA" || fantasyTeamCode === "WAIVERS") return;

                    let playerName = row["Player"];
                    let pts = parseFloat(row["FPts"]) || 0;
                    let rawPos = row["Position"] || "";
                    let positions = rawPos.replace(/"/g, '').split(',').map(p => p.trim());

                    if (playerName && positions.length > 0) {
                        if (!teamsData[fantasyTeamCode]) teamsData[fantasyTeamCode] = [];
                        teamsData[fantasyTeamCode].push({ name: playerName, positions: positions, points: pts });
                    }
                });

                let standings = [];
                for (const [code, players] of Object.entries(teamsData)) {
                    let longName = teamMap[code] || code; 
                    let result = optimizeRoster(code, longName, players);
                    if (result.bpr_score > 0) standings.push(result);
                }

                finalStandings = standings.sort((a, b) => b.bpr_score - a.bpr_score);
                document.getElementById('loading-state').classList.add('hidden');
                
                handleRouting();
            },
            error: function() {
                document.getElementById('loading-state').innerHTML = `Error loading data. Check GitHub link.`;
            }
        });
    }

    // 4. Routing & Navigation
    function handleRouting() {
        const urlParams = new URLSearchParams(window.location.search);
        const requestedTeam = urlParams.get('team');
        
        if (requestedTeam) {
            const teamObj = finalStandings.find(t => t.team_code === requestedTeam.toUpperCase());
            if (teamObj) {
                renderTeamDetail(teamObj);
                return;
            }
        }
        renderStandings();
    }

    window.addEventListener("popstate", () => {
        handleRouting();
    });

    function navigateToTeam(teamCode) {
        window.history.pushState({}, '', `?team=${teamCode}`);
        handleRouting();
    }

    function navigateHome() {
        window.history.pushState({}, '', window.location.pathname);
        handleRouting();
    }

    // 5. Render UI
    function renderStandings() {
        document.getElementById('view-team').classList.add('hidden');
        document.getElementById('view-standings').classList.remove('hidden');
        
        const tbody = document.getElementById('standings-body');
        tbody.innerHTML = ''; 

        finalStandings.forEach((team, index) => {
            const tr = document.createElement('tr');
            tr.className = `clickable-row`;
            tr.onclick = () => navigateToTeam(team.team_code); 
            tr.innerHTML = `
                <td class="rank-col">${index + 1}</td>
                <td class="team-name">${team.team_name}</td>
                <td class="score-col">${team.bpr_score.toLocaleString()}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function renderTeamDetail(team) {
        document.getElementById('view-standings').classList.add('hidden');
        document.getElementById('view-team').classList.remove('hidden');
        
        document.getElementById('detail-team-name').innerText = team.team_name;
        document.getElementById('detail-total-score').innerText = team.bpr_score.toLocaleString();
        
        const tbody = document.getElementById('team-body');
        tbody.innerHTML = ''; 
        team.roster.forEach(player => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span class="pos-badge">${player.locked_position}</span></td>
                <td class="player-name">${player.name}</td>
                <td class="score-col">${player.points}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Initialize Everything
    window.onload = () => {
        fetchFileDate(); // Gets the text from update.txt
        loadLeagueData(); // Loads the CSV and runs the math
    };
</script>

</body>
</html>
