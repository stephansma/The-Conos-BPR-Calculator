<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Hockey - BPR Standings</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0B0F19;
            --card-bg: #151A28;
            --border-color: #2A3241;
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
            --accent-cyan: #00E6F2;
            --accent-green: #39FF14;
            --row-hover: #1E2536;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            margin: 0;
            padding: 30px 20px;
            color: var(--text-main);
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            padding: 30px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(21,26,40,1) 0%, rgba(11,15,25,1) 100%);
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }

        .header-titles h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #FFFFFF;
        }

        .header-titles p {
            margin: 5px 0 0;
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .content { padding: 0; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: left;
            padding: 16px 30px;
            background-color: #0F131F;
            border-bottom: 2px solid var(--border-color);
        }

        td {
            padding: 18px 30px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .clickable-row {
            transition: background-color 0.2s;
            cursor: pointer;
        }

        .clickable-row:hover { background-color: var(--row-hover); }

        .rank-col {
            font-weight: 800;
            color: var(--text-muted);
            width: 50px;
        }

        .team-name {
            font-weight: 600;
            font-size: 16px;
            color: var(--text-main);
            transition: color 0.2s;
        }

        .clickable-row:hover .team-name { color: var(--accent-cyan); }

        .score-col {
            font-weight: 800;
            font-size: 16px;
            text-align: right;
            color: var(--accent-cyan);
            font-variant-numeric: tabular-nums;
        }

        .rank-1 .rank-col { color: #FFD700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
        .rank-2 .rank-col { color: #C0C0C0; }
        .rank-3 .rank-col { color: #CD7F32; }

        .pos-badge {
            display: inline-block;
            border: 1px solid var(--border-color);
            background: #0B0F19;
            color: var(--text-muted);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            min-width: 24px;
        }

        .btn-refresh {
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-refresh:hover {
            background: var(--accent-cyan);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 230, 242, 0.4);
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
            margin: 30px 30px 10px;
        }

        .btn-back:hover { color: var(--text-main); }
        .hidden { display: none; }
        .section-title {
            color: var(--text-main);
            font-size: 22px;
            font-weight: 800;
            margin: 0 30px 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .total-row td {
            background-color: #0F131F;
            border-top: 2px solid var(--border-color);
            border-bottom: none;
        }
        
        .total-row .score-col {
            color: var(--accent-green);
            font-size: 20px;
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-titles">
            <h1>BPR Leaderboard</h1>
            <p>End-of-Season Roster Optimization</p>
        </div>
        <button class="btn-refresh" onclick="promptAdminRefresh()">Sync Data</button>
    </div>

    <div class="content">
        <div id="view-standings">
            <table>
                <thead>
                    <tr>
                        <th>Rnk</th>
                        <th>Franchise</th>
                        <th style="text-align: right;">Total BPR</th>
                    </tr>
                </thead>
                <tbody id="standings-body">
                    <tr><td colspan="3" style="text-align:center; color:var(--text-muted);">Loading live standings...</td></tr>
                </tbody>
            </table>
        </div>

        <div id="view-team" class="hidden">
            <div class="btn-back" onclick="showStandings()">← Return to Standings</div>
            <h2 class="section-title" id="detail-team-name">Team Name Roster</h2>
            <table>
                <thead>
                    <tr>
                        <th style="width: 60px;">Pos</th>
                        <th>Player</th>
                        <th style="text-align: right;">Points</th>
                    </tr>
                </thead>
                <tbody id="team-body"></tbody>
                <tfoot>
                    <tr class="total-row">
                        <td colspan="2" style="text-align: right; font-weight: 800; color: var(--text-muted); text-transform: uppercase;">Maximum Yield:</td>
                        <td id="detail-total-score" class="score-col">0</td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>
</div>

<script>
    // --- 1. FETCH LIVE DATA FROM JSON ---
    async function loadData() {
        try {
            // Ensure we bypass the browser cache so we always get fresh stats
            const response = await fetch('data.json?t=' + new Date().getTime());
            if (!response.ok) throw new Error("Data file not found");
            const data = await response.json();
            renderStandings(data.standings);
        } catch (error) {
            document.getElementById('standings-body').innerHTML = `
                <tr>
                    <td colspan="3" style="text-align:center; color:var(--text-muted);">
                        Awaiting initial data sync. Click 'Sync Data' to run the first calculation.
                    </td>
                </tr>`;
        }
    }

    // --- 2. RENDER THE UI ---
    function renderStandings(standings) {
        const tbody = document.getElementById('standings-body');
        tbody.innerHTML = ''; // Clear loading text
        
        standings.forEach((team, index) => {
            const tr = document.createElement('tr');
            tr.className = `clickable-row rank-${index + 1}`;
            tr.onclick = () => showTeamDetail(team); 
            
            const formattedScore = team.bpr_score.toLocaleString();
            
            tr.innerHTML = `
                <td class="rank-col">${index + 1}</td>
                <td class="team-name">${team.team_name}</td>
                <td class="score-col">${formattedScore}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function showTeamDetail(team) {
        document.getElementById('view-standings').classList.add('hidden');
        document.getElementById('view-team').classList.remove('hidden');
        
        document.getElementById('detail-team-name').innerText = team.team_name.toUpperCase();
        document.getElementById('detail-total-score').innerText = team.bpr_score.toLocaleString();
        
        const tbody = document.getElementById('team-body');
        tbody.innerHTML = ''; 
        
        team.roster.forEach(player => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span class="pos-badge">${player.locked_position}</span></td>
                <td style="font-weight: 600;">${player.name}</td>
                <td class="score-col" style="color: var(--text-main); font-size: 15px;">${player.points}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function showStandings() {
        document.getElementById('view-team').classList.add('hidden');
        document.getElementById('view-standings').classList.remove('hidden');
    }

    // --- 3. THE SECURE GITHUB ACTIONS TRIGGER ---
    async function promptAdminRefresh() {
        const token = prompt("SYSTEM ADMIN\n\nEnter GitHub Personal Access Token to force data sync:", "");
        if (!token) return;

        // ! IMPORTANT ! Change these to match your actual GitHub details
        const repoOwner = "stephansma"; 
        const repoName = "The-Conos-BPR-Calculator";
        const workflowFileName = "bpr_update.yml";

        try {
            const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/actions/workflows/${workflowFileName}/dispatches`, {
                method: "POST",
                headers: {
                    "Accept": "application/vnd.github.v3+json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({ ref: "main" })
            });

            if (response.ok) {
                alert("Authentication accepted. Secure data pull initiated.\n\nThe Python script is crunching the numbers on GitHub's servers. Refresh this page in ~60 seconds to see updated standings.");
            } else {
                const errData = await response.json();
                alert("Error triggering sync: " + errData.message + "\n\nPlease check your token and repository permissions.");
            }
        } catch (error) {
            alert("Network error trying to contact GitHub API.");
        }
    }

    // Start the app on load
    loadData();
</script>

</body>
</html>
